# .github/workflows/check-env-vars.yml
name: Check Vercel Env Vars

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'security/**'
      - 'deps/**'
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'

jobs:
  verify-env-vars:
    name: Verify required env vars in Vercel
    runs-on: ubuntu-latest
    # ────────────────────────────────────────────────────────────────────
    # Skip for Dependabot PRs.
    #
    # GitHub does not expose regular Actions secrets to workflows triggered
    # by `pull_request` events whose actor is `dependabot[bot]`, so
    # `secrets.VERCEL_TOKEN` resolves to the empty string and the Vercel API
    # call fails with 401 — a false negative that has nothing to do with the
    # dep bump itself. The required check status is still reported via the
    # `verify-env-vars-skip` passthrough job below so branch protection stays
    # green for Dependabot PRs.
    # ────────────────────────────────────────────────────────────────────
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Fetch and validate Vercel env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch env var list from Vercel (key names only; values are redacted for Sensitive vars)
          response=$(curl --silent --fail \
            --header "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v9/projects/atlas-passport/env?teamId=team_4QVS3jF4bz6HIripIcSe0Re5&limit=100") || {
            echo "ERROR: Vercel API request failed. Check that VERCEL_TOKEN is set and valid."
            exit 1
          }

          # Extract keys per target using jq
          production_keys=$(echo "$response" | jq -r '.envs[] | select(.target[] == "production") | .key' 2>/dev/null | sort)
          preview_keys=$(echo "$response"    | jq -r '.envs[] | select(.target[] == "preview")    | .key' 2>/dev/null | sort)

          required_keys=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            RESEND_API_KEY
            RESEND_FROM_EMAIL
            RESEND_FROM_NAME
            CRON_SECRET
            NEXT_PUBLIC_APP_URL
          )

          missing_production=()
          missing_preview=()

          for key in "${required_keys[@]}"; do
            echo "$production_keys" | grep -qx "$key" || missing_production+=("$key")
            echo "$preview_keys"    | grep -qx "$key" || missing_preview+=("$key")
          done

          failed=0

          if [ ${#missing_production[@]} -gt 0 ]; then
            echo "MISSING from PRODUCTION target:"
            for k in "${missing_production[@]}"; do echo "  - $k"; done
            failed=1
          fi

          if [ ${#missing_preview[@]} -gt 0 ]; then
            echo "MISSING from PREVIEW target:"
            for k in "${missing_preview[@]}"; do echo "  - $k"; done
            failed=1
          fi

          if [ $failed -eq 0 ]; then
            echo "OK: All required env vars are present in both production and preview."
          else
            echo ""
            echo "Fix: Vercel dashboard -> atlas-passport -> Settings -> Environment Variables"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Passthrough job for Dependabot PRs.
  #
  # Branch protection requires the `Verify required env vars in Vercel` check
  # name to report a status on every PR. Because the main job is conditionally
  # skipped for `dependabot[bot]`, this stub publishes the same check name
  # with a success status so Dependabot PRs aren't blocked on a check that
  # can never run (no secret access).
  # ──────────────────────────────────────────────────────────────────────────
  verify-env-vars-skip:
    name: Verify required env vars in Vercel
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Skip (Dependabot PR — no secret access)
        run: |
          echo "Skipping Vercel env-var verification for Dependabot PR."
          echo "Reason: GitHub does not expose VERCEL_TOKEN to pull_request runs"
          echo "whose actor is dependabot[bot]. The push event on main will"
          echo "re-run this check with full secret access once merged."
