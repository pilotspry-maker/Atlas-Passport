# .github/workflows/check-env-vars.yml
name: Check Vercel Env Vars

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'security/**'
      - 'deps/**'
      - 'feat/**'
      - 'fix/**'

jobs:
  verify-env-vars:
    name: Verify required env vars in Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Fetch and validate Vercel env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch env var list from Vercel (key names only; values are redacted for Sensitive vars)
          response=$(curl --silent --fail \
            --header "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v9/projects/atlas-passport/env?teamId=team_4QVS3jF4bz6HIripIcSe0Re5&limit=100") || {
            echo "ERROR: Vercel API request failed. Check that VERCEL_TOKEN is set and valid."
            exit 1
          }

          # Extract keys per target using jq
          production_keys=$(echo "$response" | jq -r '.envs[] | select(.target[] == "production") | .key' 2>/dev/null | sort)
          preview_keys=$(echo "$response"    | jq -r '.envs[] | select(.target[] == "preview")    | .key' 2>/dev/null | sort)

          required_keys=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            RESEND_API_KEY
            RESEND_FROM_EMAIL
            RESEND_FROM_NAME
            CRON_SECRET
            NEXT_PUBLIC_APP_URL
          )

          missing_production=()
          missing_preview=()

          for key in "${required_keys[@]}"; do
            echo "$production_keys" | grep -qx "$key" || missing_production+=("$key")
            echo "$preview_keys"    | grep -qx "$key" || missing_preview+=("$key")
          done

          failed=0

          if [ ${#missing_production[@]} -gt 0 ]; then
            echo "MISSING from PRODUCTION target:"
            for k in "${missing_production[@]}"; do echo "  - $k"; done
            failed=1
          fi

          if [ ${#missing_preview[@]} -gt 0 ]; then
            echo "MISSING from PREVIEW target:"
            for k in "${missing_preview[@]}"; do echo "  - $k"; done
            failed=1
          fi

          if [ $failed -eq 0 ]; then
            echo "OK: All required env vars are present in both production and preview."
          else
            echo ""
            echo "Fix: Vercel dashboard -> atlas-passport -> Settings -> Environment Variables"
            exit 1
          fi
