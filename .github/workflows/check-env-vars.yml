# .github/workflows/check-env-vars.yml  — clean single-fetch version
#
# Drop-in replacement for the step above. (VERCEL_TOKEN configured 2026-06-22) Uses a temp file to avoid
# calling the Vercel API twice.

name: Check Vercel Env Vars

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'security/**'
      - 'deps/**'
      - 'feat/**'
      - 'fix/**' 

jobs:
  verify-env-vars:
    name: Verify required env vars in Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Fetch env vars from Vercel API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Fetch the project's env var list and save to a temp file.
          # Vercel returns key names even for Sensitive vars; values are redacted.
          curl --silent --fail \
            --header "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v9/projects/atlas-passport/env?teamId=team_4QVS3jF4bz6HIripIcSe0Re5&limit=100" \
            > /tmp/vercel_envs.json || {
              echo "ERROR: Vercel API request failed. Verify VERCEL_TOKEN is set and valid."
              exit 1
            }

      - name: Validate mandatory keys exist in production and preview
        run: |
          python3 - /tmp/vercel_envs.json <<'PYEOF'
import json, sys

# Load the JSON response saved by the previous step.
with open(sys.argv[1]) as f:
    data = json.load(f)

envs = data.get("envs", [])

# Build sets of key names per target environment.
production_keys = set()
preview_keys    = set()

for entry in envs:
    targets = entry.get("target", [])
    key     = entry.get("key", "")
    if "production" in targets:
        production_keys.add(key)
    if "preview" in targets:
        preview_keys.add(key)

# Mandatory keys for the Atlas Passport project.
required = [
    "NEXT_PUBLIC_SUPABASE_URL",
    "NEXT_PUBLIC_SUPABASE_ANON_KEY",
    "SUPABASE_SERVICE_ROLE_KEY",
    "RESEND_API_KEY",
    "RESEND_FROM_EMAIL",
    "RESEND_FROM_NAME",
    "CRON_SECRET",
    "NEXT_PUBLIC_APP_URL",
]

missing_production = [k for k in required if k not in production_keys]
missing_preview    = [k for k in required if k not in preview_keys]

if not missing_production and not missing_preview:
    print("OK: All required env vars are present in both production and preview targets.")
    sys.exit(0)

# Report missing keys with enough context to act on immediately.
print("FAILED: One or more required env vars are missing from Vercel.\n")

if missing_production:
    print("Missing from PRODUCTION target:")
    for k in missing_production:
        print(f"  - {k}")
    print()

if missing_preview:
    print("Missing from PREVIEW target:")
    for k in missing_preview:
        print(f"  - {k}")
    print()

print("Fix: Open the Vercel dashboard → atlas-passport → Settings → Environment Variables,")
print("add the missing keys, then re-run this workflow (push an empty commit or re-trigger CI).")
sys.exit(1)
PYEOF
