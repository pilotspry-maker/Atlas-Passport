# .github/workflows/apply-migrations.yml
#
# One-shot workflow: applies migrations 005–008 to the live Supabase project.
# Triggered manually via workflow_dispatch only — never runs automatically.
# Delete this file after migrations are confirmed applied.
#
# Requires: SUPABASE_ACCESS_TOKEN secret (Supabase personal access token)
# Generate at: https://supabase.com/dashboard/account/tokens

name: Apply Migrations 005–008

on:
  workflow_dispatch:

jobs:
  apply-migrations:
    name: Apply migrations 005–008 to production Supabase
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: gaavynmmysdhovpatzlp
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify SUPABASE_ACCESS_TOKEN is set
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "❌ SUPABASE_ACCESS_TOKEN secret is not set."
            echo "   Generate one at: https://supabase.com/dashboard/account/tokens"
            echo "   Add it to: GitHub → Settings → Secrets → SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          echo "✓ SUPABASE_ACCESS_TOKEN is set (${#SUPABASE_ACCESS_TOKEN} chars)"

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://supabase.com/install.sh | sh
          echo "$HOME/.supabase/bin" >> $GITHUB_PATH

      - name: Link Supabase project
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply migration 005 — RLS exploit patches
        run: |
          echo "Applying 005_rls_exploit_patches.sql..."
          supabase db query --file supabase/migrations/005_rls_exploit_patches.sql
          echo "✓ Migration 005 applied"

      - name: Apply migration 006 — Test helpers
        run: |
          echo "Applying 006_test_helpers.sql..."
          supabase db query --file supabase/migrations/006_test_helpers.sql
          echo "✓ Migration 006 applied"

      - name: Apply migration 007 — RLS column guards
        run: |
          echo "Applying 007_rls_column_guards.sql..."
          supabase db query --file supabase/migrations/007_rls_column_guards.sql
          echo "✓ Migration 007 applied"

      - name: Apply migration 008 — create_test_users helper
        run: |
          echo "Applying 008_create_test_users_helper.sql..."
          supabase db query --file supabase/migrations/008_create_test_users_helper.sql
          echo "✓ Migration 008 applied"

      - name: Verify create_test_users function exists
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/rpc/create_test_users" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          if [ "$STATUS" = "404" ]; then
            echo "❌ create_test_users function not found after migration — check logs above"
            exit 1
          fi
          echo "✓ create_test_users function is live (HTTP $STATUS)"

      - name: Summary
        run: |
          echo "════════════════════════════════════════"
          echo "  Migrations 005–008 applied successfully"
          echo "  Re-run CI on PR #18 to confirm tests pass"
          echo "════════════════════════════════════════"
