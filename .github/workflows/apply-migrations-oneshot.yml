name: Apply Migrations 004-008 (ONE-SHOT — delete after use)

on:
  workflow_dispatch:

jobs:
  apply-migrations:
    name: Apply Migrations to Production Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Decode and apply migrations
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
          SQL_B64: ""
        run: |
          echo "$SQL_B64" | base64 -d > /tmp/migrations.sql
          echo "SQL lines: $(wc -l < /tmp/migrations.sql)"
          # Use direct DB host (IPv6 — GitHub runners support IPv6)
          psql \
            "postgresql://postgres:$PGPASSWORD@db.gaavynmmysdhovpatzlp.supabase.co:5432/postgres?sslmode=require" \
            -f /tmp/migrations.sql
          echo "Exit code: $?"

      - name: Verify migration 008
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            -X POST "https://gaavynmmysdhovpatzlp.supabase.co/rest/v1/rpc/create_test_users" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "create_test_users: HTTP $STATUS"
          [ "$STATUS" != "404" ] || (echo "FAIL: migration 008 not applied" && exit 1)
          echo "PASS: migration 008 confirmed"
