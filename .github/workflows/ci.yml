# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-size:
    name: Lint · Build · Bundle Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed to post the size report comment

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout PR branch
        uses: actions/checkout@v7

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # ── 3. Install ───────────────────────────────────────────────────────────
      #
      # npm install is used instead of npm ci because:
      # 1. @react-email packages declare React 18 peer deps (--legacy-peer-deps)
      # 2. esbuild optional platform binaries in package-lock.json are generated
      #    per-OS; npm ci fails when a platform entry is missing on the runner.
      # Cache key uses package-lock.json hash for layer reuse across identical runs.
      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 4. Lint ──────────────────────────────────────────────────────────────
      #
      # next lint shells out to eslint with the flat config (eslint.config.js).
      # eslint-config-next@16 enforces react-hooks/purity and
      # react-hooks/set-state-in-effect among the 66 bundled rules.
      # --max-warnings 0 means ANY warning is also a hard failure.
      - name: ESLint (zero warnings allowed)
        run: npx eslint src/ --max-warnings 0

      # ── 5. Type-check ────────────────────────────────────────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── 6. Build ─────────────────────────────────────────────────────────────
      #
      # Requires real env vars so Next.js can validate public constants at
      # build time. Values are non-secret placeholders — the build only needs
      # them to be present and non-empty; actual secrets live in Vercel.
      - name: next build
        env:
          NEXT_PUBLIC_SUPABASE_URL:     ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL:          ${{ secrets.NEXT_PUBLIC_APP_URL }}
          # Server-only secrets — required by build-time imports
          SUPABASE_SERVICE_ROLE_KEY:    ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:               ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:            ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME:             ${{ secrets.RESEND_FROM_NAME }}
          CRON_SECRET:                  ${{ secrets.CRON_SECRET }}
        run: npm run build

      # ── 7. Bundle size report ────────────────────────────────────────────────
      #
      # Next 16 writes .next/diagnostics/route-bundle-stats.json after every
      # Turbopack build. It contains firstLoadUncompressedJsBytes per route.
      # We parse it, convert to KB, sort descending, enforce a per-route hard
      # cap (default 1 500 KB), and post the table as a PR comment.
      - name: Parse bundle sizes
        id: bundle
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          CAP_KB = int(os.environ.get("BUNDLE_CAP_KB", "1500"))
          stats_path = ".next/diagnostics/route-bundle-stats.json"

          with open(stats_path) as f:
              routes = json.load(f)

          routes.sort(key=lambda r: r["firstLoadUncompressedJsBytes"], reverse=True)

          lines = []
          violations = []
          total_bytes = 0

          for r in routes:
              kb = r["firstLoadUncompressedJsBytes"] / 1024
              total_bytes += r["firstLoadUncompressedJsBytes"]
              flag = " ⚠️" if kb > CAP_KB else ""
              lines.append(f"| `{r['route']}` | {kb:,.1f} KB{flag} |")
              if kb > CAP_KB:
                  violations.append(f"{r['route']} ({kb:,.1f} KB > {CAP_KB} KB cap)")

          total_kb = total_bytes / 1024
          table = "\n".join(lines)

          # Write outputs for downstream steps
          delimiter = "EOF_BUNDLE"
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"total_kb={total_kb:.1f}\n")
              out.write(f"route_count={len(routes)}\n")
              out.write(f"violations={len(violations)}\n")
              out.write(f"table<<{delimiter}\n{table}\n{delimiter}\n")
              if violations:
                  vlist = "\n".join(f"- {v}" for v in violations)
                  out.write(f"violation_list<<{delimiter}\n{vlist}\n{delimiter}\n")
              else:
                  out.write(f"violation_list<<{delimiter}\nnone\n{delimiter}\n")
          PYEOF
        env:
          BUNDLE_CAP_KB: '1500'

      # ── 8. Post PR comment with size table ──────────────────────────────────
      - name: Comment bundle sizes on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: bundle-size-report
          message: |
            ## Bundle Size Report

            **${{ steps.bundle.outputs.route_count }} routes · Total first-load JS: ${{ steps.bundle.outputs.total_kb }} KB (uncompressed)**
            Cap per route: 1 500 KB — routes exceeding this are flagged ⚠️

            | Route | First-Load JS |
            |---|---|
            ${{ steps.bundle.outputs.table }}

            ${{ steps.bundle.outputs.violations != '0' && format('### ⚠️ Cap exceeded\n{0}', steps.bundle.outputs.violation_list) || '✅ All routes within cap.' }}

            <sub>Sizes are uncompressed. Gzip typically reduces by ~70%. Generated by CI · `route-bundle-stats.json`</sub>

      # ── 9. Fail if cap exceeded ──────────────────────────────────────────────
      - name: Enforce bundle size cap
        if: steps.bundle.outputs.violations != '0'
        run: |
          echo "Bundle size cap exceeded on ${{ steps.bundle.outputs.violations }} route(s):"
          echo "${{ steps.bundle.outputs.violation_list }}"
          echo ""
          echo "Cap is 1 500 KB uncompressed per route. Reduce bundle size before merging."
          exit 1


  # ════════════════════════════════════════════════════════════════════════════
  # RLS Security Tests
  # ════════════════════════════════════════════════════════════════════════════
  #
  # Runs on every PR to main. Validates that Supabase RLS policies correctly
  # enforce access control on passports, nodes, rewards, check_ins, corridors,
  # and profiles tables via the live PostgREST API.
  #
  # Two layers of coverage:
  #   1. Python/pytest (REST API) — always runs; tests all 4 access tiers
  #   2. pgTAP (SQL-level)        — runs only when Supabase CLI is available
  #
  # Both layers must pass for the check to be green. A failure blocks merge.
  # ════════════════════════════════════════════════════════════════════════════

  rls-tests:
    name: RLS Security Tests
    runs-on: ubuntu-latest
    needs: lint-build-size    # Don't run if build itself is broken
    # ------------------------------------------------------------------
    # Skip for Dependabot PRs.
    # GitHub does not expose secrets to pull_request runs whose actor is
    # dependabot[bot], so the live-DB seeding step always fails with empty
    # SUPABASE_URL. A passthrough job (`rls-tests-skip`) reports the same
    # check name with success so branch protection isn't permanently red
    # on dependency PRs. The full suite still runs on the push event after
    # merge to main.
    # ------------------------------------------------------------------
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write    # Post sticky failure comment

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout PR branch
        uses: actions/checkout@v7

      # ── 2. Python + dependencies ─────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pytest-httpx
          restore-keys: ${{ runner.os }}-pip-

      - name: Install pytest + httpx
        run: pip install pytest httpx

      # ── 3. Seed RLS test fixtures (idempotent) ──────────────────────────────
      #
      # FIX (2026-06-23): replaced signUp → confirm_test_users with
      # rpc/create_test_users (migration 008, SECURITY DEFINER).
      # create_test_users inserts directly into auth.users — no email sent,
      # no GoTrue rate-limit hit. signUp was causing 429 over_email_send_rate_limit
      # on every CI run against the free-tier Supabase project.
      #
      # Strategy:
      #   a) rpc/create_test_users   → migration 008, inserts into auth.users directly
      #   b) rpc/seed_ci_fixtures    → migration 006, upserts corridor/node/reward
      #   c) rpc/seed_ci_fixtures_v2 → adds inactive corridor (exploit-05, non-fatal)
      #   d) signIn → seed passports + check-in via each player's own JWT
      - name: Seed RLS test fixtures
        env:
          SUPABASE_URL:              ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 << 'EOF'
          import os, time, json, base64, httpx

          URL      = os.environ["SUPABASE_URL"].rstrip("/")
          ANON_KEY = os.environ["SUPABASE_ANON_KEY"]
          SVC_KEY  = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          REST     = f"{URL}/rest/v1"
          AUTH     = f"{URL}/auth/v1"

          ANON_HEADERS = {
              "apikey": ANON_KEY,
              "Content-Type": "application/json",
          }

          # Seed RPCs (create_test_users, seed_ci_fixtures, seed_ci_fixtures_v2)
          # were locked to service_role by migration 017. Anon cannot call them.
          SVC_HEADERS = {
              "apikey": SVC_KEY,
              "Authorization": f"Bearer {SVC_KEY}",
              "Content-Type": "application/json",
          }

          PASSPORT_ACTIVE_ID   = "dddddddd-0000-0000-0000-000000000001"
          PASSPORT_COMPLETE_ID = "dddddddd-0000-0000-0000-000000000002"
          CHECKIN_ID           = "eeeeeeee-0000-0000-0000-000000000001"
          CORRIDOR_ID          = "aaaaaaaa-0000-0000-0000-000000000001"
          NODE_ID              = "bbbbbbbb-0000-0000-0000-000000000001"

          def rpc(fn, args=None, fatal=True):
              r = httpx.post(f"{REST}/rpc/{fn}", headers=SVC_HEADERS,
                             json=args or {}, timeout=30)
              if not r.is_success:
                  msg = f"  [rpc] {fn}: {r.status_code} {r.text}"
                  if fatal:
                      raise RuntimeError(msg)
                  print(f"{msg} (non-fatal)")
                  return None
              result = r.json()
              print(f"  [rpc] {fn}: ok → {result}")
              return result

          def sign_in(email, password):
              """Sign in and return (access_token, user_id)."""
              r = httpx.post(
                  f"{AUTH}/token?grant_type=password",
                  headers=ANON_HEADERS,
                  json={"email": email, "password": password},
                  timeout=20,
              )
              if not r.is_success:
                  raise RuntimeError(f"signIn {email}: {r.status_code} {r.text}")
              data = r.json()
              jwt = data["access_token"]
              padding = "=" * (4 - len(jwt.split(".")[1]) % 4)
              payload = json.loads(base64.b64decode(jwt.split(".")[1] + padding).decode())
              return jwt, payload["sub"]

          def authed_upsert(table, row, jwt):
              """Upsert a row using the player's own JWT."""
              r = httpx.post(
                  f"{REST}/{table}",
                  headers={
                      "apikey": ANON_KEY,
                      "Authorization": f"Bearer {jwt}",
                      "Content-Type": "application/json",
                      "Prefer": "resolution=ignore-duplicates,return=minimal",
                  },
                  json=row, timeout=20,
              )
              if r.status_code not in (200, 201, 204):
                  print(f"  WARN upsert {table}: {r.status_code} {r.text}")
              else:
                  print(f"  upsert {table}: ok")

          # ── a) Create users via DB function (migration 008) ──────────────────
          # Inserts directly into auth.users — no email, no GoTrue rate limits.
          print("Creating test users via rpc/create_test_users (no email sent)...")
          rpc("create_test_users")
          time.sleep(1)  # let profiles trigger materialise

          # ── b) Seed corridor / node / reward via RPC ─────────────────────────
          print("Seeding fixtures via rpc/seed_ci_fixtures...")
          rpc("seed_ci_fixtures")

          # ── b2) Seed inactive corridor (exploit-05, non-fatal) ───────────────
          rpc("seed_ci_fixtures_v2", fatal=False)

          # ── c) Sign in to get player JWTs and profile UUIDs ──────────────────
          print("Signing in as both players...")
          p1_jwt, p1_id = sign_in("ci_player@test.local", "TestPassword123!")
          p2_jwt, p2_id = sign_in("ci_admin@test.local", "TestPassword123!")
          print(f"  player_one id: {p1_id}")
          print(f"  player_two id: {p2_id}")

          # ── d) Seed passports + check-in via each player's own JWT ────────────
          print("Seeding passports and check-in...")
          authed_upsert("passports", {
              "id": PASSPORT_ACTIVE_ID,
              "user_id": p1_id, "corridor_id": CORRIDOR_ID,
              "status": "active",
          }, p1_jwt)
          authed_upsert("check_ins", {
              "id": CHECKIN_ID,
              "passport_id": PASSPORT_ACTIVE_ID, "user_id": p1_id,
              "node_id": NODE_ID, "status": "pending",
              "proof_url": "https://example.com/ci-proof.jpg",
              "proof_storage_path": "ci-test/proof.jpg",
          }, p1_jwt)
          authed_upsert("passports", {
              "id": PASSPORT_COMPLETE_ID,
              "user_id": p2_id, "corridor_id": CORRIDOR_ID,
              "status": "complete",
          }, p2_jwt)

          print("Fixtures seeded.")
          EOF

      # ── 4. Run Python RLS integration tests ──────────────────────────────────
      - name: pytest — RLS integration tests
        id: pytest_rls
        env:
          SUPABASE_URL:              ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY:         ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          pytest tests/rls/test_rls_policies.py \
            --tb=short \
            --color=yes \
            -v

      # ── 5. pgTAP SQL tests (conditional — Supabase CLI) ───────────────────────
      #
      # pgTAP requires a local Supabase stack. This step is intentionally
      # conditional: if the CLI is absent, the Python tests above already cover
      # the same policies at the REST-API layer, so the job can still succeed.
      #
      # To fully enable pgTAP in CI:
      #   1. Add `supabase/setup-cli@v1` step (before this one)
      #   2. Add SUPABASE_ACCESS_TOKEN to repo secrets
      #   3. Remove the `exit 0` early-return below
      - name: pgTAP — RLS SQL tests (if Supabase CLI available)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if ! command -v supabase &> /dev/null; then
            echo "Supabase CLI not installed — pgTAP step skipped."
            echo "Add supabase/setup-cli@v1 + SUPABASE_ACCESS_TOKEN to enable."
            exit 0
          fi

          echo "Supabase CLI found — running pgTAP suite..."
          supabase db start
          supabase db push --local
          supabase test db --local supabase/tests/rls_policies.test.sql

      # ── 6. Post failure summary as sticky PR comment ──────────────────────────
      - name: Post RLS failure summary
        if: failure() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: rls-test-report
          message: |
            ## ❌ RLS Security Tests Failed

            One or more Row-Level Security policy tests failed on this PR.
            **This PR cannot be merged until all RLS tests pass.**

            ### How to reproduce locally
            ```bash
            pip install pytest httpx
            SUPABASE_URL=https://gaavynmmysdhovpatzlp.supabase.co \
            SUPABASE_ANON_KEY=<anon_key> \
            SUPABASE_SERVICE_ROLE_KEY=<service_role_key> \
            pytest tests/rls/test_rls_policies.py -v
            ```

            ### Files to review
            - Policy logic: `supabase/migrations/004_rls_hardening_and_node_integrity.sql`
            - REST tests: `tests/rls/test_rls_policies.py`
            - SQL tests: `supabase/tests/rls_policies.test.sql`

            <sub>Generated by RLS Security Tests job · `rls-tests`</sub>



  # ============================================================================
  # RLS Security Tests - Dependabot passthrough
  # ============================================================================
  #
  # Reports the `RLS Security Tests` check name with a success status on
  # Dependabot PRs so branch protection doesn't block dependency updates
  # on a check that cannot run (no secret access on pull_request events
  # whose actor is dependabot[bot]).
  #
  # The full RLS suite still runs against main via the rls-exploit-tests
  # and rls-regression workflows on the push event after merge.
  # ============================================================================
  rls-tests-skip:
    name: RLS Security Tests
    runs-on: ubuntu-latest
    needs: lint-build-size
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Skip (Dependabot PR - no secret access)
        run: |
          echo "Skipping RLS Security Tests for Dependabot PR."
          echo "Reason: GitHub does not expose SUPABASE_* secrets to"
          echo "pull_request runs whose actor is dependabot[bot]."
          echo "Full suite re-runs on push to main after merge."
